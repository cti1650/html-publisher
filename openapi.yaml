openapi: 3.1.0
info:
  title: HTML Publisher API
  description: |
    HTMLコンテンツをGitHub Gistに公開し、ツールとして共有するためのAPI。

    ## 基本的な使い方

    ### 1. 新規作成
    `POST /api/tools` でHTMLを送信すると、Gistに保存されIDとURLが返されます。

    ### 2. 閲覧
    - **ブラウザで表示**: 返されたURL（例: `https://html-publisher-zeta.vercel.app/tool/abc123`）にアクセス
    - **HTMLソースを取得**: `GET /api/tools/{id}` でHTMLコンテンツをJSON形式で取得

    **注意**: `/tool/{id}` はSPAページのため、APIからは直接読み取れません。
    HTMLの中身を確認・取得するには必ず `GET /api/tools/{id}` を使用してください。

    ### 3. 更新
    既存のツールを更新するには `PUT /api/tools/{id}` を使用します。
    IDはURLの末尾部分です（例: URLが `https://html-publisher-zeta.vercel.app/tool/abc123` の場合、IDは `abc123`）。

    ### IDの特定方法
    - 作成時のレスポンスに含まれる `id` フィールド
    - ツールURL `/tool/{id}` の `{id}` 部分
    - 例: `https://html-publisher-zeta.vercel.app/tool/abc123def456` → ID: `abc123def456`
  version: 1.0.0
  license:
    name: MIT
    identifier: MIT

servers:
  - url: https://html-publisher-zeta.vercel.app
    description: 本番環境
  - url: http://localhost:3000
    description: ローカル開発環境

paths:
  /api/tools:
    post:
      summary: 新しいツールを作成
      description: |
        HTMLコンテンツをGitHub Gistにアップロードし、公開URLを生成します。

        レスポンスに含まれる `id` と `url` を保存してください。
        - `url`: ブラウザで開くとHTMLが表示されるURL
        - `id`: 後で更新する際に使用するID（URLの末尾部分と同じ）
      operationId: createTool
      tags:
        - Tools
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateToolRequest"
            example:
              html: "<html><body><h1>Hello World</h1></body></html>"
      responses:
        "201":
          description: ツールが正常に作成されました
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateToolResponse"
              example:
                id: "abc123def456"
                url: "https://your-domain.com/tool/abc123def456"
                rawUrl: "https://gist.githubusercontent.com/..."
        "400":
          description: リクエストが不正です
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "html is required and must be a string"
        "500":
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Internal server error"

  /api/openapi:
    get:
      summary: OpenAPI仕様を取得
      description: このAPIのOpenAPI仕様をYAMLまたはJSON形式で取得します
      operationId: getOpenApiSpec
      tags:
        - Documentation
      parameters:
        - name: format
          in: query
          required: false
          description: 出力形式（yaml または json）
          schema:
            type: string
            enum:
              - yaml
              - json
            default: yaml
          example: "json"
      responses:
        "200":
          description: OpenAPI仕様
          content:
            text/yaml:
              schema:
                type: string
            application/json:
              schema:
                type: object

  /api/tools/{id}:
    get:
      summary: ツールのHTMLソースを取得
      description: |
        指定されたIDのツールのHTMLコンテンツを取得します。

        **重要**: `/tool/{id}` はブラウザ表示用のSPAページです。
        HTMLの中身を確認・取得するには、このAPIエンドポイント `GET /api/tools/{id}` を使用してください。

        レスポンスの `html` フィールドに完全なHTMLソースが含まれます。
      operationId: getTool
      tags:
        - Tools
      parameters:
        - name: id
          in: path
          required: true
          description: |
            ツールのID。URLの `/tool/` の後ろの部分です。
            例: URLが `https://html-publisher-zeta.vercel.app/tool/abc123def456` の場合、IDは `abc123def456`
          schema:
            type: string
          example: "abc123def456"
      responses:
        "200":
          description: ツールが正常に取得されました
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetToolResponse"
              example:
                id: "abc123def456"
                html: "<html><body><h1>Hello World</h1></body></html>"
                rawUrl: "https://gist.githubusercontent.com/..."
        "400":
          description: リクエストが不正です
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "id is required"
        "404":
          description: ツールが見つかりません
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Tool not found"
        "500":
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Internal server error"
    put:
      summary: ツールを更新（HTML上書き）
      description: |
        指定されたIDのツールのHTMLコンテンツを上書き更新します。

        **IDの取得方法:**
        - 作成時のレスポンスに含まれる `id` フィールド
        - ツールURL `/tool/{id}` から抽出（例: `https://html-publisher-zeta.vercel.app/tool/abc123` → `abc123`）

        更新後もURLは変わりません。同じURLで新しいHTMLが表示されます。
      operationId: updateTool
      tags:
        - Tools
      parameters:
        - name: id
          in: path
          required: true
          description: |
            ツールのID。URLの `/tool/` の後ろの部分です。
            例: URLが `https://html-publisher-zeta.vercel.app/tool/abc123def456` の場合、IDは `abc123def456`
          schema:
            type: string
          example: "abc123def456"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateToolRequest"
            example:
              html: "<html><body><h1>Updated Content</h1></body></html>"
      responses:
        "200":
          description: ツールが正常に更新されました
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateToolResponse"
              example:
                id: "abc123def456"
                url: "https://your-domain.com/tool/abc123def456"
                rawUrl: "https://gist.githubusercontent.com/..."
        "400":
          description: リクエストが不正です
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "html is required and must be a string"
        "404":
          description: ツールが見つかりません
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Tool not found"
        "500":
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Internal server error"

components:
  schemas:
    CreateToolRequest:
      type: object
      required:
        - html
      properties:
        html:
          type: string
          description: 公開するHTMLコンテンツ
          minLength: 1

    CreateToolResponse:
      type: object
      required:
        - id
        - url
        - rawUrl
      properties:
        id:
          type: string
          description: ツール（Gist）のID
        url:
          type: string
          format: uri
          description: ツールの公開URL
        rawUrl:
          type: string
          format: uri
          description: GistのRaw URL

    GetToolResponse:
      type: object
      required:
        - id
        - html
        - rawUrl
      properties:
        id:
          type: string
          description: ツール（Gist）のID
        html:
          type: string
          description: HTMLコンテンツ
        rawUrl:
          type: string
          format: uri
          description: GistのRaw URL

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: エラーメッセージ

tags:
  - name: Tools
    description: |
      HTMLツールの作成・取得・更新。

      **ワークフロー:**
      1. `POST /api/tools` で新規作成 → IDとURLを取得
      2. URLにアクセスしてHTMLを確認
      3. 修正が必要な場合は `PUT /api/tools/{id}` で上書き更新
  - name: Documentation
    description: APIドキュメント
